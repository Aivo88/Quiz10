name: Build APK

# Fully self-contained: creates the whole Android project in CI, bundles the
# game from the repo root, generates an icon, and builds a shareable APK.
# You only need THIS file in the repo (plus quiz10.html and questions.json).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Android project files
        run: |
          mkdir -p "$(dirname android/settings.gradle)"
          echo  | base64 -d > android/settings.gradle
          mkdir -p "$(dirname android/build.gradle)"
          echo cGx1Z2lucyB7CiAgICBpZCAnY29tLmFuZHJvaWQuYXBwbGljYXRpb24nIHZlcnNpb24gJzguNi4xJyBhcHBseSBmYWxzZQp9Cg== | base64 -d > android/build.gradle
          mkdir -p "$(dirname android/gradle.properties)"
          echo YW5kcm9pZC51c2VBbmRyb2lkWD10cnVlCm9yZy5ncmFkbGUuanZtYXJncz0tWG14MjA0OG0gLURmaWxlLmVuY29kaW5nPVVURi04Cm9yZy5ncmFkbGUuY2FjaGluZz10cnVlCg== | base64 -d > android/gradle.properties
          mkdir -p "$(dirname android/app/build.gradle)"
          echo  | base64 -d > android/app/build.gradle
          mkdir -p "$(dirname android/app/proguard-rules.pro)"
          echo IyBLZWVwIGRlZmF1bHQgcnVsZXMuIE5vdGhpbmcgY3VzdG9tIG5lZWRlZCBmb3IgdGhpcyBXZWJWaWV3IGFwcC4K | base64 -d > android/app/proguard-rules.pro
          mkdir -p "$(dirname android/app/src/main/AndroidManifest.xml)"
          echo  | base64 -d > android/app/src/main/AndroidManifest.xml
          mkdir -p "$(dirname android/app/src/main/java/com/aivo/pubquiz/MainActivity.java)"
          echo  | base64 -d > android/app/src/main/java/com/aivo/pubquiz/MainActivity.java
          mkdir -p "$(dirname android/app/src/main/res/values/strings.xml)"
          echo PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPlB1YiBRdWl6PC9zdHJpbmc+CjwvcmVzb3VyY2VzPgo= | base64 -d > android/app/src/main/res/values/strings.xml

      - name: Generate launcher icon
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick fonts-dejavu-core
          FONT=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf
          convert -size 432x432 xc:'#0E1428' \
            -font "$FONT" \
            -fill '#F5F1E6' -pointsize 96  -gravity North -annotate +0+70  'PUB' \
            -fill '#F2B138' -draw 'roundrectangle 62,235 370,378 30,30' \
            -fill '#12142A' -pointsize 90  -gravity North -annotate +0+250 'QUIZ' \
            /tmp/ic.png
          for pair in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            name="${pair%%:*}"; size="${pair##*:}"
            dir="android/app/src/main/res/mipmap-$name"
            mkdir -p "$dir"
            convert /tmp/ic.png -resize "${size}x${size}" "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Bundle game + questions into app assets
        run: |
          mkdir -p android/app/src/main/assets
          cp quiz10.html    android/app/src/main/assets/quiz10.html
          cp questions.json android/app/src/main/assets/questions.json

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PubQuiz-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
