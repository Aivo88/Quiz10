<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUIZ 10</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1428">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QUIZ 10">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
  :root{
    --fs:1;                 /* font scale (settings) */
    --grad:#1c2647;         /* background glow */
    --bg:#0E1428;
    --bg2:#0A0F1F;
    --panel:#18213B;
    --panel2:#1F2A49;
    --line:#2C3A5F;
    --ink:#F5F1E6;
    --muted:#8A93AD;
    --gold:#F2B138;
    --gold-dim:#9c7526;
    --good:#34D399;
    --bad:#F05252;
    --focus:#FFE08A;
    --p1:#F2B138; --p2:#34D399; --p3:#57B9FF; --p4:#F472B6;
    --p5:#A78BFA; --p6:#FB923C; --p7:#2DD4BF; --p8:#F87171;
  }
  /* ---- Colour themes ---- */
  body[data-theme="forest"]{
    --grad:#123024; --bg:#0C1F17; --bg2:#08140F; --panel:#14352A; --panel2:#1B4636;
    --line:#2C5C48; --ink:#F1F6EF; --muted:#8FB0A0; --gold:#E7B24A; --gold-dim:#8f6f2c;
    --good:#4ADE80; --bad:#F87171; --focus:#F4D98A;
  }
  body[data-theme="neon"]{
    --grad:#1a1030; --bg:#08060F; --bg2:#040308; --panel:#160F28; --panel2:#241640;
    --line:#3B2A66; --ink:#F5F0FF; --muted:#9A8BC2; --gold:#F5C542; --gold-dim:#9c7a1f;
    --good:#22E6A5; --bad:#FF4D6D; --focus:#7CF9FF;
    --p1:#F5C542; --p2:#22E6A5; --p3:#4CC9FF; --p4:#FF6FD8; --p5:#B18CFF; --p6:#FF9E45; --p7:#3DF5D0; --p8:#FF5C7A;
  }
  body[data-theme="light"]{
    --grad:#e9eef7; --bg:#F3F5FA; --bg2:#E4E9F2; --panel:#FFFFFF; --panel2:#EDF1F8;
    --line:#CBD5E6; --ink:#1C2540; --muted:#6B7690; --gold:#D69422; --gold-dim:#b07a1a;
    --good:#159C6B; --bad:#D6453F; --focus:#E0A93A;
    --p1:#C88413; --p2:#159C6B; --p3:#2C7BD6; --p4:#D24C97; --p5:#7A5CE0; --p6:#E07A1F; --p7:#159A8F; --p8:#D6453F;
  }
  body[data-theme="ocean"]{
    --grad:#0c2a3a; --bg:#08202E; --bg2:#05161F; --panel:#0F3346; --panel2:#164459;
    --line:#245D73; --ink:#EAF6FB; --muted:#88AEC0; --gold:#4FC3E8; --gold-dim:#2b7f9c;
    --good:#3FE0C5; --bad:#FF6B6B; --focus:#9EE7FF;
  }
  body[data-theme="sunset"]{
    --grad:#3a1330; --bg:#2A1226; --bg2:#1A0A18; --panel:#3D1C34; --panel2:#4F2743;
    --line:#6B3A5A; --ink:#FDEEE6; --muted:#C89FB4; --gold:#FF9E45; --gold-dim:#b06a24;
    --good:#57E0A6; --bad:#FF5C7A; --focus:#FFC58A;
  }
  body[data-theme="grape"]{
    --grad:#241442; --bg:#1A0F33; --bg2:#0F0820; --panel:#271847; --panel2:#33205C;
    --line:#463075; --ink:#F1EBFF; --muted:#A99AD0; --gold:#C9A0FF; --gold-dim:#7d5bb0;
    --good:#4ADE80; --bad:#FF6B9A; --focus:#DCC6FF;
  }
  body[data-theme="mono"]{
    --grad:#141414; --bg:#0A0A0A; --bg2:#000000; --panel:#161616; --panel2:#222222;
    --line:#3A3A3A; --ink:#FFFFFF; --muted:#9A9A9A; --gold:#FFD400; --gold-dim:#a08a00;
    --good:#00E676; --bad:#FF3B30; --focus:#FFEB3B;
  }
  body[data-theme="sepia"]{
    --grad:#efe3cf; --bg:#F3E9D6; --bg2:#E6D8BF; --panel:#FBF4E6; --panel2:#F0E6D0;
    --line:#D8C6A2; --ink:#3B2E1E; --muted:#8A7A5E; --gold:#B5791F; --gold-dim:#8f5f16;
    --good:#2E8B57; --bad:#C0392B; --focus:#D8A63A;
    --p1:#A9701A; --p2:#2E8B57; --p3:#2C6FB0; --p4:#B0417F; --p5:#6B4FB0; --p6:#C06A1A; --p7:#158080; --p8:#C0392B;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 120% at 50% -10%, var(--grad) 0%, var(--bg) 45%, var(--bg2) 100%);
    color:var(--ink);
    font-family:"Segoe UI",Roboto,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    user-select:none;
  }
  /* Overscan-safe stage for TVs */
  #stage{
    position:fixed; inset:0;
    padding:4.5vh 5vw;
    display:flex; flex-direction:column;
    transform:scale(var(--scale,1));
    transform-origin:center center;
  }
  .screen{display:none; flex:1; min-height:0; flex-direction:column; overflow-y:auto; overflow-x:hidden}
  .screen.active{display:flex}
  .screen::-webkit-scrollbar{width:10px}
  .screen::-webkit-scrollbar-thumb{background:var(--line); border-radius:999px}

  /* Wordmark */
  .brand{
    font-weight:800; letter-spacing:.28em; text-transform:uppercase;
    font-size:clamp(20px,3.2vw,44px); line-height:1;
    color:var(--ink);
  }
  .brand b{color:var(--gold)}
  .brand .num{
    display:inline-block; margin-left:.15em;
    color:var(--bg); background:var(--gold);
    padding:.08em .3em; border-radius:.18em; letter-spacing:.05em;
    box-shadow:0 0 0 3px rgba(242,177,56,.25);
  }
  .tagline{color:var(--muted); font-size:clamp(12px,1.4vw,18px); letter-spacing:.22em; text-transform:uppercase; margin-top:.7em}

  /* Generic centered card layout */
  .center{flex:none; min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:clamp(18px,3vh,40px); padding:clamp(10px,2vh,24px) 0}
  .center>*:first-child{margin-top:auto}
  .center>*:last-child{margin-bottom:auto}
  .stack{display:flex; flex-direction:column; align-items:center; gap:clamp(14px,2.4vh,28px); width:100%}

  h2.q-title{font-size:calc(clamp(22px,3vw,40px) * var(--fs)); font-weight:800; letter-spacing:.02em; text-align:center}
  .sub{color:var(--muted); font-size:clamp(13px,1.5vw,20px); text-align:center; max-width:60ch}

  /* Focusable buttons */
  .btn{
    position:relative;
    background:var(--panel);
    border:2px solid var(--line);
    color:var(--ink);
    border-radius:16px;
    font-size:calc(clamp(18px,2.1vw,30px) * var(--fs));
    font-weight:700;
    letter-spacing:.02em;
    cursor:pointer;
    transition:transform .08s ease, background .15s ease, border-color .15s ease;
    outline:none;
    display:inline-flex; align-items:center; justify-content:center; gap:.5em;
  }
  .btn .k{color:var(--muted); font-weight:600; font-size:.7em}
  .btn.wide{width:min(560px,80vw)}
  .btn.ghost{background:transparent}
  .btn.gold{background:linear-gradient(180deg,#F5BE52,#E09B22); border-color:#caa23f; color:#241a05}
  .btn.good{background:linear-gradient(180deg,#3ee0a6,#25b487); border-color:#2aa87f; color:#062018}
  body.kbd .btn.focused{
    border-color:var(--focus);
    background:var(--panel2);
    transform:scale(1.045);
    box-shadow:0 0 0 4px rgba(255,224,138,.35), 0 12px 34px rgba(0,0,0,.45);
  }
  body.kbd .btn.gold.focused{background:linear-gradient(180deg,#FFD277,#F0AB2E)}
  body.kbd .btn.good.focused{background:linear-gradient(180deg,#57efb6,#2fc793)}

  .row{display:flex; gap:clamp(12px,1.6vw,22px); flex-wrap:wrap; justify-content:center; align-items:center}

  /* Language screen big flags */
  .lang-row{display:flex; gap:clamp(20px,3vw,48px)}
  .lang{
    width:min(340px,38vw); aspect-ratio:4/3;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  }
  .lang .flag{font-size:clamp(48px,8vw,110px); line-height:1}
  .lang .name{font-size:clamp(20px,2.4vw,34px); font-weight:800; letter-spacing:.06em}

  /* Setup steppers */
  .stepper{display:flex; align-items:center; gap:clamp(16px,2vw,30px)}
  .stepper .val{min-width:2.4ch; text-align:center; font-size:clamp(40px,6vw,86px); font-weight:800; color:var(--gold)}
  .stepper .val small{display:block; font-size:.28em; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; font-weight:700; margin-top:.4em}
  .arrow{
    width:clamp(56px,7vw,86px); height:clamp(56px,7vw,86px); border-radius:50%;
    background:var(--panel); border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(26px,3vw,40px); cursor:pointer; color:var(--ink);
  }
  body.kbd .arrow.focused{border-color:var(--focus); background:var(--panel2); transform:scale(1.08); box-shadow:0 0 0 4px rgba(255,224,138,.35)}

  /* GAME screen */
  #screen-game{gap:clamp(10px,1.6vh,20px)}
  .scorebar{display:flex; gap:clamp(8px,1vw,14px); flex-wrap:wrap; align-items:stretch}
  .pchip{
    flex:1 1 0; min-width:90px;
    background:var(--panel); border:2px solid var(--line); border-radius:12px;
    padding:clamp(8px,1.1vh,14px) clamp(10px,1vw,16px);
    display:flex; flex-direction:column; gap:2px; position:relative; overflow:hidden;
  }
  .pchip .pname{font-size:clamp(12px,1.3vw,18px); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--muted)}
  .pchip .pscore{font-size:calc(clamp(22px,2.6vw,40px) * var(--fs)); font-weight:800; line-height:1}
  .pchip .bar{position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--c)}
  .pchip.active{border-color:var(--c); background:var(--panel2); box-shadow:0 0 0 3px color-mix(in srgb, var(--c) 40%, transparent)}
  .pchip.active .pname{color:var(--ink)}
  .pchip.out{opacity:.5}
  .pchip .tag{position:absolute; right:8px; top:6px; font-size:clamp(10px,1vw,13px); font-weight:800; letter-spacing:.04em}
  .pchip.passed .tag{color:var(--good)}
  .pchip.busted .tag{color:var(--bad)}

  .qhead{display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-top:clamp(4px,.8vh,10px)}
  .turnlabel{color:var(--muted); font-size:clamp(13px,1.5vw,20px); letter-spacing:.06em}
  .turnlabel b{color:var(--c-turn,var(--gold))}
  .roundbank{
    font-size:clamp(14px,1.7vw,22px); font-weight:800;
    background:rgba(242,177,56,.14); color:var(--gold);
    border:1px solid var(--gold-dim); padding:.35em .8em; border-radius:999px; white-space:nowrap;
  }
  .category{
    font-size:calc(clamp(22px,3.1vw,46px) * var(--fs)); font-weight:800; letter-spacing:.01em;
    line-height:1.1; margin:clamp(2px,.6vh,8px) 0 clamp(6px,1vh,14px);
  }
  .category .pick{color:var(--gold)}

  .board{
    flex:1; min-height:0;
    display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr;
    gap:clamp(8px,1.1vw,16px);
  }
  .opt{
    position:relative;
    background:var(--panel); border:2px solid var(--line); border-radius:14px;
    display:flex; align-items:center; gap:clamp(10px,1.2vw,18px);
    padding:0 clamp(14px,1.6vw,26px);
    font-size:calc(clamp(16px,2vw,30px) * var(--fs)); font-weight:700; cursor:pointer;
    transition:transform .07s ease, border-color .12s ease, background .12s ease;
    overflow:hidden;
  }
  .opt .idx{
    flex:none; width:1.9em; height:1.9em; border-radius:9px;
    background:var(--panel2); color:var(--muted);
    display:flex; align-items:center; justify-content:center;
    font-size:.72em; font-weight:800;
  }
  .opt .txt{flex:1; min-width:0; white-space:normal; overflow-wrap:break-word; word-break:normal; line-height:1.12}
  body.kbd .opt.focused{border-color:var(--focus); background:var(--panel2); transform:scale(1.02); box-shadow:0 0 0 4px rgba(255,224,138,.32), 0 10px 28px rgba(0,0,0,.4); z-index:2}
  .opt.claimed{border-color:var(--c,var(--good)); background:var(--bg2); box-shadow:inset 5px 0 0 var(--c,var(--good))}
  .opt.claimed .idx{background:var(--c,var(--good)); color:#0c1226}
  .opt.claimed .txt{color:var(--ink)}
  .opt.wrong{border-color:var(--c,var(--bad)); background:var(--bg2); box-shadow:inset 5px 0 0 var(--c,var(--bad)), inset 0 0 0 2px rgba(240,82,82,.45)}
  .opt.wrong .idx{background:var(--c,var(--bad)); color:#0c1226}
  .opt.wrong .tick{color:var(--bad)}
  .opt.claimed .tick{color:var(--good)}
  .opt.dim{opacity:.4}
  .opt .tick{margin-left:auto; font-size:1.1em; flex:none}

  .actions{display:flex; gap:clamp(10px,1.4vw,20px); justify-content:center; margin-top:clamp(4px,.8vh,10px)}
  /* larger, clearer Back buttons */
  .btn.back{min-width:12ch; padding:clamp(15px,2.3vh,26px) clamp(38px,6vw,68px); font-size:calc(clamp(18px,2.2vw,28px) * var(--fs)); font-weight:800}
  .btn.num{min-width:3.4ch; padding:clamp(14px,2vh,22px) clamp(24px,3.4vw,40px); font-size:calc(clamp(24px,2.8vw,38px) * var(--fs)); font-weight:800; border-radius:16px}
  .btn.num.gold{background:linear-gradient(180deg,#F5BE52,#E09B22); border-color:#caa23f; color:#241a05}
  /* Pass & bank button — clear, distinct */
  #passBtn{min-width:14ch; padding:clamp(15px,2.2vh,24px) clamp(30px,4.5vw,56px); font-size:calc(clamp(18px,2.2vw,28px) * var(--fs)); font-weight:800; border-radius:16px; box-shadow:0 6px 20px rgba(0,0,0,.4)}

  /* Toast / turn banner */
  .banner{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,10,22,.72); z-index:50; backdrop-filter:blur(3px);
  }
  .banner.show{display:flex}
  .banner .card{
    background:var(--panel); border:2px solid var(--line); border-radius:22px;
    padding:clamp(28px,4vh,56px) clamp(34px,5vw,72px); text-align:center;
    max-width:80vw; box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .banner .big{font-size:clamp(30px,5vw,64px); font-weight:800; line-height:1.05}
  .banner .mid{font-size:clamp(18px,2.4vw,34px); color:var(--muted); margin-top:.6em}
  .banner .pts{font-size:clamp(40px,7vw,96px); font-weight:800; margin:.2em 0}
  .banner .good{color:var(--good)} .banner .bad{color:var(--bad)} .banner .gold{color:var(--gold)}

  /* Win confetti-ish crown */
  .crown{font-size:clamp(50px,9vw,120px); line-height:1}

  /* turn announcement */
  #turnBanner .card{cursor:pointer}
  .tb-eye{color:var(--muted); letter-spacing:.32em; font-size:clamp(14px,1.8vw,24px); font-weight:800; text-transform:uppercase}
  .tb-name{font-size:clamp(40px,8vw,96px); font-weight:800; line-height:1.05; margin:.15em 0 .35em; color:var(--tc,var(--gold))}
  .tb-hint{color:var(--muted); font-size:clamp(14px,1.9vw,26px); font-weight:600}
  .tb-hint .press{
    display:inline-block; margin-right:.4em; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:.05em .5em;
  }

  .hint{position:fixed; left:0; right:0; bottom:1.2vh; text-align:center; color:var(--muted); font-size:clamp(11px,1.2vw,15px); letter-spacing:.04em; opacity:.85}
  .hint kbd{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:.1em .5em; font-family:inherit; margin:0 .15em}

  /* menu buttons */
  .menu-col{display:flex; flex-direction:column; gap:clamp(12px,2vh,20px); width:min(560px,86vw)}
  .btn.block{width:100%; justify-content:flex-start; gap:.6em}
  .btn.block .mi{font-size:1.2em}
  .btn.disabled{opacity:.4; pointer-events:none}

  /* topic grid */
  .topic-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(10px,1.6vw,20px); width:min(1100px,100%)}
  .btn.topic{flex-direction:column; gap:.35em; padding:clamp(14px,2.2vh,26px) clamp(10px,1.5vw,20px)}
  .btn.topic .ticon{font-size:clamp(30px,4vw,52px); line-height:1}
  .btn.topic .tlabel{font-size:calc(clamp(14px,1.6vw,22px) * var(--fs)); font-weight:700; text-align:center}
  @media (max-width:560px){ .topic-grid{grid-template-columns:repeat(2,1fr)} }

  /* settings rows */
  .set-list{display:flex; flex-direction:column; gap:clamp(16px,2.8vh,30px); width:100%; max-width:760px}
  .set-row{display:flex; flex-direction:column; align-items:flex-start; gap:10px}
  .set-label{font-size:calc(clamp(15px,1.8vw,24px) * var(--fs)); font-weight:700; color:var(--ink)}
  .set-opts{display:flex; gap:clamp(8px,1vw,14px); flex-wrap:wrap; width:100%}
  .btn.chip{padding:clamp(10px,1.4vh,16px) clamp(16px,1.8vw,26px); font-size:calc(clamp(15px,1.7vw,22px) * var(--fs)); border-radius:12px}
  .btn.chip.sel{background:var(--gold); border-color:var(--gold); color:#241a05}
  .btn.chip.sel.focused, body.kbd .btn.chip.sel.focused{background:var(--gold)}
  .sw{width:clamp(30px,3.4vw,44px); height:clamp(30px,3.4vw,44px); display:inline-flex; align-items:center; justify-content:center; font-size:1.1em}

  /* size slider */
  .slider{display:flex; align-items:center; gap:clamp(12px,1.6vw,20px); width:min(520px,100%); padding:10px 8px; cursor:pointer; border-radius:14px; border:2px solid transparent}
  body.kbd .slider.focused{border-color:var(--focus); box-shadow:0 0 0 4px rgba(255,224,138,.3)}
  .slider .track{position:relative; flex:1; height:14px; background:var(--panel2); border:1px solid var(--line); border-radius:999px}
  .slider .fill{position:absolute; left:0; top:0; bottom:0; background:var(--gold); border-radius:999px}
  .slider .thumb{position:absolute; top:50%; left:0; width:clamp(26px,3vw,34px); height:clamp(26px,3vw,34px); border-radius:50%; background:var(--gold); border:3px solid var(--bg); transform:translate(-50%,-50%); box-shadow:0 2px 10px rgba(0,0,0,.45)}
  .slider .slabel{min-width:3.4ch; text-align:center; font-weight:800; font-size:calc(clamp(16px,1.9vw,26px) * var(--fs)); color:var(--gold)}

  /* confirm overlay */
  #confirmBox .card{max-width:min(560px,86vw)}
  #confirmBox .cmsg{font-size:calc(clamp(20px,2.6vw,34px) * var(--fs)); font-weight:800; line-height:1.2; margin-bottom:1em}
  #confirmBox .crow{display:flex; gap:clamp(12px,1.6vw,20px); justify-content:center}
  #confirmBox .crow .btn{min-width:9ch; padding:clamp(16px,2.2vh,24px) clamp(30px,4vw,52px); font-size:calc(clamp(19px,2.3vw,30px) * var(--fs))}
</style>
</head>
<body>
<div id="stage">

  <!-- MAIN MENU -->
  <section id="screen-menu" class="screen active">
    <div class="center">
      <div style="text-align:center">
        <div class="brand">QUIZ<span class="num">10</span></div>
        <div class="tagline" data-i="tagline">The push-your-luck trivia game</div>
      </div>
      <div class="menu-col">
        <button class="btn gold block focusable" data-focus data-action="newgame"><span class="mi">▶</span><span data-i="newGame">New game</span></button>
        <button class="btn block focusable" data-action="settings"><span class="mi">⚙</span><span data-i="settings">Settings</span></button>
      </div>
    </div>
  </section>

  <!-- SETTINGS -->
  <section id="screen-settings" class="screen">
    <div class="center">
      <h2 class="q-title" data-i="settingsTitle">Settings</h2>
      <div class="set-list">
        <div class="set-row">
          <span class="set-label" data-i="textSize">Text &amp; card size</span>
          <div class="set-opts">
            <div class="slider focusable" id="sizeSlider" data-role="slider">
              <div class="track" id="sizeTrack"><div class="fill" id="sizeFill"></div><div class="thumb" id="sizeThumb"></div></div>
              <div class="slabel" id="sizeLabel">M</div>
            </div>
          </div>
        </div>

/* Load an external questions.json (served alongside the app) if present.
   Falls back silently to the built-in bank when missing or invalid. */
async function loadQuestions(){
  try{
    const res = await fetch('questions.json', {cache:'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    if(Array.isArray(data)){
      const valid = data.filter(q => q && q.cat && q.cat.en && q.cat.fi && Array.isArray(q.o) && q.o.length===10);
      if(valid.length){ QUESTIONS.length=0; valid.forEach(q=>QUESTIONS.push(q)); topicDecks={}; }
    }
  }catch(e){ /* keep built-in questions */ }
}

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]];} return a; }

/* ---------- Sound effects (Web Audio, no files) ---------- */
let actx = null;
function audioInit(){
  if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; } }
  if(actx && actx.state==='suspended') actx.resume();
}
function tone(freq, dur, type, vol, when){
  if(!actx) return;
  const t0 = actx.currentTime + (when||0);
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type||'sine';
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(actx.destination);
  o.start(t0); o.stop(t0+dur+0.03);
}
const sfx = {
  correct(){ tone(660,0.12,'sine',0.28,0); tone(988,0.20,'sine',0.24,0.09); },
  wrong(){ tone(196,0.30,'sawtooth',0.20,0); tone(146,0.34,'sawtooth',0.16,0.06); },
  pass(){ tone(523,0.10,'triangle',0.18,0); tone(392,0.14,'triangle',0.15,0.07); },
  turn(){ tone(784,0.14,'sine',0.20,0); },
  win(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.24,'sine',0.26,i*0.13)); },
  select(){ tone(880,0.05,'square',0.09,0); }
};

function showScreen(id){

  $('#'+id).classList.add('active');
  // focus first default (or first focusable) on the new screen
  requestAnimationFrame(()=>{
    const scr = $('#'+id);
    let f = scr.querySelector('[data-focus]') || scr.querySelector('.focusable');
    setFocus(f);
  });
}

/* ---------- Spatial focus system ---------- */
let focused = null;
function focusScope(){
  const cb = $('#confirmBox');
  if(cb.classList.contains('show')) return cb;
  return $('.screen.active');
}
function focusables(){
  const scr = focusScope();
  if(!scr) return [];
  return $$('.focusable').filter(el=>{
    if(!scr.contains(el)) return false;
    if(el.classList.contains('gone')) return false;
    const r = el.getBoundingClientRect();
    return r.width>0 && r.height>0 && el.offsetParent!==null;
  });
}
function setFocus(el){
  if(!el) return;
  if(focused) focused.classList.remove('focused');
  focused = el;
  focused.classList.add('focused');
  try{ el.scrollIntoView({block:'nearest', inline:'nearest'}); }catch(e){}
}
function move(dir){
  const list = focusables();
  if(!focused || !list.includes(focused)){ setFocus(list[0]); return; }
  const cr = focused.getBoundingClientRect();
  const cx = cr.left+cr.width/2, cy = cr.top+cr.height/2;
  let best=null, bestScore=Infinity;
  for(const el of list){
    if(el===focused) continue;
    const r = el.getBoundingClientRect();
    const x = r.left+r.width/2, y = r.top+r.height/2;
    const dx = x-cx, dy = y-cy;
    let primary, cross;
    if(dir==='right'){ if(dx<=8) continue; primary=dx; cross=Math.abs(dy); }
    else if(dir==='left'){ if(dx>=-8) continue; primary=-dx; cross=Math.abs(dy); }
    else if(dir==='down'){ if(dy<=8) continue; primary=dy; cross=Math.abs(dx); }
    else { if(dy>=-8) continue; primary=-dy; cross=Math.abs(dx); }
    const score = primary + cross*2;   // prefer aligned + close
    if(score<bestScore){ bestScore=score; best=el; }
  }
  if(best) setFocus(best);
}

/* ---------- Game flow ---------- */
function startGame(){
  players = [];
  for(let i=0;i<numPlayers;i++){
    players.push({
      name:(lang==='fi'?'Pelaaja ':'Player ')+(i+1),
      score:0,
      color:PLAYER_COLORS[i]
    });
  }
  turnIdx = 0;
  roundStarter = 0;
  topicDecks = {};
  buildScorebar();
  chooseTopic();
}

function buildScorebar(){
  const bar = $('#scorebar'); bar.innerHTML='';
  players.forEach((p,i)=>{
    const el = document.createElement('div');
    el.className='pchip';
    el.style.setProperty('--c', `var(${p.color})`);
    el.dataset.i = i;
    el.innerHTML = `<span class="bar"></span>
      <span class="tag"></span>
      <span class="pname">${p.name}</span>
      <span class="pscore">${p.score}</span>`;
    bar.appendChild(el);
  });
}
function updateScorebar(){
  $$('#scorebar .pchip').forEach((el,i)=>{
    const base = players[i].score;
    const prov = (pstatus[i]==='active' && roundTokens[i]>0) ? ` +${roundTokens[i]}` : '';
    el.querySelector('.pscore').innerHTML = base + (prov?`<span style="color:var(--gold);font-size:.6em"> ${prov.trim()}</span>`:'');
    el.classList.toggle('active', i===turnIdx && pstatus[i]==='active');
    el.classList.toggle('passed', pstatus[i]==='passed');
    el.classList.toggle('busted', pstatus[i]==='busted');
    el.classList.toggle('out', pstatus[i]!=='active');
    const tag = el.querySelector('.tag');
    tag.textContent = pstatus[i]==='passed' ? tr('passedTag') : (pstatus[i]==='busted' ? tr('bustedTag') : '');
  });
}

/* ---------- Topic selection (start of each round) ---------- */
function poolFor(topic){
  if(topic==='mixed') return QUESTIONS.map((_,i)=>i);
  return QUESTIONS.map((q,i)=>q.topic===topic?i:-1).filter(i=>i>=0);
}
function chooseTopic(){
  turnActive=false; awaitingTurn=false;
  $('#turnBanner').classList.remove('show');
  const p = players[roundStarter % players.length];
  $('#topicTitle').innerHTML = `<span style="color:var(${p.color})">${p.name}</span> — ${tr('topicPrompt')}`;
  renderTopics();
  showScreen('screen-topic');
}
function renderTopics(){
  const grid = $('#topicGrid'); grid.innerHTML='';
  TOPICS.forEach(t=>{
    const b = document.createElement('button');
    b.className='btn topic focusable';
    b.dataset.action='topic'; b.dataset.topic=t.key;
    b.innerHTML = `<span class="ticon">${t.icon}</span><span class="tlabel">${t[lang]}</span>`;
    grid.appendChild(b);
  });
}

function drawQuestion(){
  if(!topicDecks[currentTopic] || topicDecks[currentTopic].length===0){
    topicDecks[currentTopic] = shuffle(poolFor(currentTopic));
  }
  const qi = topicDecks[currentTopic].pop();
  const q = QUESTIONS[qi];
  const opts = shuffle(q.o).map(o=>({label:o[lang==='fi'?1:0], correct:!!o[2], state:'idle'}));
  current = { cat:q.cat[lang], opts };
}

/* Start the round with the chosen topic; opener plays immediately (no banner) */
function newQuestion(){
  drawQuestion();
  pstatus = players.map(()=>'active');
  roundTokens = players.map(()=>0);
  turnIdx = roundStarter % players.length;
  if(pstatus[turnIdx]!=='active') turnIdx = nextActive(turnIdx);
  $('#category').textContent = current.cat;
  renderBoard();
  updateHeader();
  updateScorebar();
  showScreen('screen-game');
  turnActive = true;
  focusFirstOption();
  requestAnimationFrame(fitBoard);
}

/* Show the "up next" banner; play begins only on OK / tap */
function announceTurn(){
  turnActive = false;
  awaitingTurn = true;
  const p = players[turnIdx];
  $('#turnBanner').style.setProperty('--tc', `var(${p.color})`);
  $('#tbEye').textContent = tr('upNext');
  $('#tbName').textContent = p.name;
  $('#tbHint').innerHTML = tr('startHint');
  $('#turnBanner').classList.add('show');
}

function confirmTurn(){
  if(!awaitingTurn) return;
  awaitingTurn = false;
  $('#turnBanner').classList.remove('show');
  turnActive = true;
  sfx.turn();
  updateHeader();
  updateScorebar();
  focusFirstOption();
}

function renderBoard(){
  const board = $('#board'); board.innerHTML='';
  current.opts.forEach((o,i)=>{
    const el = document.createElement('div');
    el.className='opt focusable';
    el.dataset.i=i;
    el.dataset.action='pick';
    el.innerHTML = `<span class="idx">${i+1}</span><span class="txt">${o.label}</span><span class="tick"></span>`;
    board.appendChild(el);
    syncOpt(el,o);
  });
}

/* Shrink each option's text until it fits its card (width + height) */
function fitBoard(){
  $$('#board .opt').forEach(opt=>{
    const txt = opt.querySelector('.txt');
    if(!txt) return;
    txt.style.fontSize = '';                 // reset to CSS-computed size
    let fs = parseFloat(getComputedStyle(txt).fontSize) || 20;
    const min = 10;
    let guard = 0;
    while(guard<60 && fs>min &&
          (txt.scrollWidth > txt.clientWidth+1 || txt.scrollHeight > opt.clientHeight-6)){
      fs -= 1;
      txt.style.fontSize = fs + 'px';
      guard++;
    }
  });
}

function syncOpt(el,o){
  el.classList.remove('claimed','wrong');
  const tick = el.querySelector('.tick');
  if(o.state==='claimed'){
    el.classList.add('claimed');
    el.style.setProperty('--c', `var(${players[o.by].color})`);
    tick.textContent = '✓';
  } else if(o.state==='wrong'){
    el.classList.add('wrong');
    if(o.by!=null) el.style.setProperty('--c', `var(${players[o.by].color})`);
    tick.textContent = '✕';
  } else {
    tick.textContent = '';
  }
  if(o.state!=='idle') el.classList.remove('focusable');
}

function updateHeader(){
  const p = players[turnIdx];
  $('#screen-game').style.setProperty('--c-turn', `var(${p.color})`);
  $('#turnLabel').innerHTML = `<b style="color:var(${p.color})">${p.name}</b>${tr('turn')}`;
  $('#roundBank').textContent = tr('roundLabel')+' '+roundTokens[turnIdx]+' '+tr('pointsShort');
  const pb = $('#passBtn');
  pb.textContent = `💰 ${tr('pass')}${roundTokens[turnIdx]>0?` (${roundTokens[turnIdx]})`:''}`;
}

function focusFirstOption(){
  requestAnimationFrame(()=>{
    const first = $('#board .opt.focusable');
    setFocus(first || focusables()[0]);
  });
}

function nextActive(from){
  for(let k=1;k<=players.length;k++){
    const idx=(from+k)%players.length;
    if(pstatus[idx]==='active') return idx;
  }
  return from;
}
function anyActive(){ return pstatus.some(s=>s==='active'); }
function idleLeft(){ return current.opts.some(o=>o.state==='idle'); }

/* current player picks one option (optional confirm first) */
function pickOption(i){
  if(!turnActive || pstatus[turnIdx]!=='active') return;
  const o = current.opts[i];
  if(!o || o.state!=='idle') return;
  if(settings.confirmA){
    askConfirm(`${tr('confirmAnswerQ')}: "${o.label}"?`, ()=>doPick(i));
  } else doPick(i);
}
function doPick(i){
  const o = current.opts[i];
  if(!o || o.state!=='idle') return;
  const el = $(`#board .opt[data-i="${i}"]`);
  if(o.correct){
    o.state='claimed'; o.by=turnIdx;
    roundTokens[turnIdx]++;
    syncOpt(el,o);
    sfx.correct();
  } else {
    o.state='wrong'; o.by=turnIdx;
    syncOpt(el,o);
    sfx.wrong();
    bustPlayer(turnIdx);
  }
  updateHeader(); updateScorebar();
  advance(o.correct ? 650 : 850);
}

/* current player passes: bank collected tokens, out for the round */
function passTurn(){
  if(!turnActive || pstatus[turnIdx]!=='active') return;
  if(settings.confirmB){
    const n = roundTokens[turnIdx];
    askConfirm(`${tr('confirmBankQ')} ${n} ${tr('pointsWord')} ${tr('andPass')}`, ()=>doPass());
  } else doPass();
}
function doPass(){
  if(pstatus[turnIdx]!=='active') return;
  players[turnIdx].score += roundTokens[turnIdx];
  pstatus[turnIdx]='passed';
  sfx.pass();
  updateScorebar();
  advance(300);
}

function bustPlayer(p){
  // lose this round's points, but keep the player's colour visible on the board
  roundTokens[p]=0;
  pstatus[p]='busted';
}

function advance(delay){
  turnActive=false; // brief lock
  if(!anyActive() || !idleLeft()){
    setTimeout(endRound, delay);
  } else {
    setTimeout(()=>{
      turnIdx = nextActive(turnIdx);
      updateHeader(); updateScorebar();
      announceTurn();
    }, delay);
  }
}

function endRound(){
  // if the round ended with the board exhausted, still-active players keep their tokens
  players.forEach((p,i)=>{
    if(pstatus[i]==='active'){ p.score += roundTokens[i]; pstatus[i]='passed'; }
  });
  updateScorebar();

  const reached = players.map((p,i)=>({i,s:p.score})).filter(x=>x.s>=target);
  if(reached.length){
    reached.sort((a,b)=>b.s-a.s);
    setTimeout(()=>endGame(reached[0].i), 700);
    return;
  }
  // next round: rotate starter, pick a new topic
  roundStarter = (roundStarter+1)%players.length;
  setTimeout(chooseTopic, 900);
}

function endGame(winnerIdx){
  hideBanner();
  awaitingTurn=false; $('#turnBanner').classList.remove('show');
  sfx.win();
  const w = players[winnerIdx];
  const sorted = players.slice().sort((a,b)=>b.score-a.score);
  $('#winName').innerHTML = `<span style="color:var(${w.color})">${w.name}</span>`;
  $('#winSub').innerHTML = tr('winSub') + '<br><br><b>'+tr('finalScores')+'</b><br>' +
    sorted.map(p=>`${p.name}: ${p.score} ${tr('pointsShort')}`).join(' &nbsp;·&nbsp; ');
  showScreen('screen-win');
}

/* ---------- Persistent storage (guarded for artifact preview) ---------- */
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

function loadSettings(){
  const raw = lsGet('quiz10_settings');
  if(raw){ try{ settings = Object.assign(settings, JSON.parse(raw)); }catch(e){} }
  // migrate: 'edge' is now a fit/zoom factor (0.7–1); reset legacy out-of-range values
  const f = parseFloat(settings.edge);
  if(!(f>=0.7 && f<=1)) settings.edge='1';
  applySettings();
}
function saveSettings(){ lsSet('quiz10_settings', JSON.stringify(settings)); }
function applySettings(){
  document.body.setAttribute('data-theme', settings.theme==='default' ? '' : settings.theme);
  document.body.style.setProperty('--fs', settings.size);
  document.body.style.setProperty('--scale', settings.edge);
  updateSlider();
  updateEdgeSlider();
  $$('[data-action="setTheme"]').forEach(b=> b.classList.toggle('sel', b.dataset.v===settings.theme));
  $$('[data-action="setLang"]').forEach(b=> b.classList.toggle('sel', b.dataset.v===lang));
  const swA=$('#swA'), swB=$('#swB');
  if(swA){ swA.textContent = settings.confirmA?'✓':'✕'; swA.parentElement.classList.toggle('sel', settings.confirmA); }
  if(swB){ swB.textContent = settings.confirmB?'✓':'✕'; swB.parentElement.classList.toggle('sel', settings.confirmB); }
}

/* size slider */
function sizeIndex(){
  let best=0, bd=1e9;
  SIZES.forEach((s,i)=>{ const d=Math.abs(s.v-parseFloat(settings.size)); if(d<bd){ bd=d; best=i; } });
  return best;
}
function updateSlider(){
  const idx=sizeIndex(), pct=idx/(SIZES.length-1)*100;
  const fill=$('#sizeFill'), thumb=$('#sizeThumb'), lab=$('#sizeLabel');
  if(fill) fill.style.width=pct+'%';
  if(thumb) thumb.style.left=pct+'%';
  if(lab) lab.textContent=SIZES[idx].n;
}
function setSizeIndex(idx){
  idx=Math.max(0,Math.min(SIZES.length-1,idx));
  const changed = idx!==sizeIndex();
  settings.size=String(SIZES[idx].v);
  applySettings(); saveSettings();
  if(changed) sfx.select();
}
function sliderIdxFromX(x){
  const t=$('#sizeTrack'); if(!t) return sizeIndex();
  const r=t.getBoundingClientRect();
  let ratio=(x-r.left)/r.width; ratio=Math.max(0,Math.min(1,ratio));
  return Math.round(ratio*(SIZES.length-1));
}

/* edge (TV margin) slider */
function edgeIndex(){
  const v=parseFloat(settings.edge)||1;
  let best=0, bd=1e9;
  EDGES.forEach((e,i)=>{ const d=Math.abs(e-v); if(d<bd){ bd=d; best=i; } });
  return best;
}
function updateEdgeSlider(){
  const idx=edgeIndex(), pct=idx/(EDGES.length-1)*100;
  const fill=$('#edgeFill'), thumb=$('#edgeThumb'), lab=$('#edgeValLabel');
  if(fill) fill.style.width=pct+'%';
  if(thumb) thumb.style.left=pct+'%';
  if(lab) lab.textContent=Math.round(EDGES[idx]*100)+'%';
}
function setEdgeIndex(idx){
  idx=Math.max(0,Math.min(EDGES.length-1,idx));
  const changed = idx!==edgeIndex();
  settings.edge=String(EDGES[idx]);
  applySettings(); saveSettings();
  if(changed) sfx.select();
}
function edgeIdxFromX(x){
  const t=$('#edgeTrack'); if(!t) return edgeIndex();
  const r=t.getBoundingClientRect();
  let ratio=(x-r.left)/r.width; ratio=Math.max(0,Math.min(1,ratio));
  return Math.round(ratio*(EDGES.length-1));
}

/* ---------- Global click + key handling ---------- */
function activate(el){
  if(!el) return;
  const a = el.dataset.action;
  const menuSfx = ['lang','players','target','start','again','newgame','settings','menu','mainmenu','backToLang','setTheme','setLang','toggleA','toggleB','topic','confirmYes','confirmNo'];
  if(menuSfx.includes(a)) sfx.select();

  if(a==='newgame'){ showScreen('screen-lang'); }
  else if(a==='backToLang'){ showScreen('screen-lang'); }
  else if(a==='settings'){ applySettings(); showScreen('screen-settings'); }
  else if(a==='menu'){ saveSettings(); showScreen('screen-menu'); }
  else if(a==='mainmenu'){ showScreen('screen-menu'); }
  else if(a==='setTheme'){ settings.theme=el.dataset.v; applySettings(); saveSettings(); }
  else if(a==='setLang'){ lang=el.dataset.v; applyStaticText(); applySettings(); saveSettings(); }
  else if(a==='toggleA'){ settings.confirmA=!settings.confirmA; applySettings(); saveSettings(); }
  else if(a==='toggleB'){ settings.confirmB=!settings.confirmB; applySettings(); saveSettings(); }
  else if(a==='update'){ doUpdate(el); }
  else if(a==='lang'){ lang=el.dataset.lang; applyStaticText(); refreshSetup(); showScreen('screen-setup'); }
  else if(a==='players'){ numPlayers = Math.min(8, Math.max(1, numPlayers + (+el.dataset.d))); refreshSetup(); }
  else if(a==='target'){ target = +el.dataset.v; refreshSetup(); }
  else if(a==='start'){ startGame(); }
  else if(a==='topic'){ currentTopic = el.dataset.topic; newQuestion(); }
  else if(a==='pick'){ pickOption(+el.dataset.i); }
  else if(a==='pass'){ passTurn(); }
  else if(a==='again'){ startGame(); }
  else if(a==='confirmYes'){ closeConfirm(true); }
  else if(a==='confirmNo'){ closeConfirm(false); }
}

document.addEventListener('click', e=>{
  audioInit();
  if(awaitingTurn){ confirmTurn(); return; }
  const el = e.target.closest('.focusable');
  if(el){ setFocus(el); activate(el); }
});
// Touch input hides the remote focus ring
document.addEventListener('touchstart', ()=>{ document.body.classList.remove('kbd'); }, {passive:true});
document.addEventListener('mousedown', ()=>{ document.body.classList.remove('kbd'); });
window.addEventListener('resize', ()=>{ if($('#screen-game').classList.contains('active')) fitBoard(); });

document.addEventListener('keydown', e=>{
  audioInit();
  const k = e.key;
  const navKeys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '];
  if(navKeys.includes(k)) document.body.classList.add('kbd');

  // Confirm dialog captures input first
  if(confirmOpen()){
    if(k==='Enter'||k===' '){ e.preventDefault(); activate(focused); }
    else if(k==='ArrowUp'){ e.preventDefault(); move('up'); }
    else if(k==='ArrowDown'){ e.preventDefault(); move('down'); }
    else if(k==='ArrowLeft'){ e.preventDefault(); move('left'); }
    else if(k==='ArrowRight'){ e.preventDefault(); move('right'); }
    else if(k==='Escape'||k==='Backspace'||k==='GoBack'){ e.preventDefault(); closeConfirm(false); }
    return;
  }

  // While the "up next" banner is showing, any key starts the turn
  if(awaitingTurn){
    if(navKeys.includes(k)){ e.preventDefault(); confirmTurn(); }
    return;
  }

  // Size slider: left/right adjust value; up/down fall through to focus move
  if(focused && focused.id==='sizeSlider' && (k==='ArrowLeft'||k==='ArrowRight')){
    e.preventDefault();
    setSizeIndex(sizeIndex() + (k==='ArrowRight'?1:-1));
    return;
  }
  if(focused && focused.id==='edgeSlider' && (k==='ArrowLeft'||k==='ArrowRight')){
    e.preventDefault();
    setEdgeIndex(edgeIndex() + (k==='ArrowRight'?1:-1));
    return;
  }

  if(k==='ArrowUp'){ e.preventDefault(); move('up'); }
  else if(k==='ArrowDown'){ e.preventDefault(); move('down'); }
  else if(k==='ArrowLeft'){ e.preventDefault(); move('left'); }
  else if(k==='ArrowRight'){ e.preventDefault(); move('right'); }
  else if(k==='Enter'||k===' '){ e.preventDefault(); activate(focused); }
  else if(k==='Escape'||k==='Backspace'||k==='GoBack'){
    e.preventDefault();
    goBack();
  }
});

/* ---------- Back navigation (on-screen + hardware/remote back) ---------- */
let _lastBack = 0;
function goBack(){
  const now = Date.now();
  if(now - _lastBack < 250) return true; // debounce double events
  _lastBack = now;
  if(confirmOpen()){ closeConfirm(false); return true; }
  if(awaitingTurn){ return true; }
  const active = $('.screen.active').id;
  if(active==='screen-setup'){ showScreen('screen-lang'); return true; }
  if(active==='screen-topic'){ showScreen('screen-menu'); return true; }
  if(active==='screen-settings'){ saveSettings(); showScreen('screen-menu'); return true; }
  if(active==='screen-lang'){ showScreen('screen-menu'); return true; }
  if(active==='screen-win'){ showScreen('screen-menu'); return true; }
  if(active==='screen-game'){ if(turnActive) passTurn(); return true; }
  return false; // on main menu → allow the browser/app to exit
}

/* Trap the hardware/remote back button so it navigates in-app instead of
   closing the app. Uses the History API: keep one buffered state and re-arm
   it after each back press we handle. */
history.pushState(null, '', location.href);
window.addEventListener('popstate', ()=>{
  const handled = goBack();
  if(handled){ history.pushState(null, '', location.href); }
});

/* ---------- Boot ---------- */
loadSettings();
applyStaticText();
refreshSetup();
const _ver = $('#verNum');
function updateVer(){ if(_ver) _ver.textContent = 'v'+APP_VERSION+' · '+Math.round(window.innerWidth)+'×'+Math.round(window.innerHeight); }
updateVer();
window.addEventListener('resize', updateVer);
setFocus($('#screen-menu [data-focus]'));
loadQuestions();

/* Service worker (offline + updates), only where supported/secure */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* Check-for-updates: always pull the freshest copy from the server,
   regardless of version — unregister SW, clear caches, cache-busted reload */
function doUpdate(btn){
  if(btn) btn.textContent = tr('updating');
  (async()=>{
    try{
      if('serviceWorker' in navigator){
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r=>r.unregister().catch(()=>{})));
      }
      if(window.caches){ const ks = await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); }
    }catch(e){}
    // reload from the clean path with a cache-busting token so the browser
    // fetches a fresh copy even if HTTP-cached
    location.replace(location.pathname + '?u=' + Date.now());
  })();
}

/* size slider drag (touch / mouse) */
(function(){
  const track = $('#sizeTrack');
  if(!track) return;
  let dragging=false;
  const getX = e => (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
  const apply = e => { setSizeIndex(sliderIdxFromX(getX(e))); };
  track.addEventListener('pointerdown', e=>{ dragging=true; setFocus($('#sizeSlider')); apply(e); e.preventDefault(); });
  window.addEventListener('pointermove', e=>{ if(dragging) apply(e); });
  window.addEventListener('pointerup', ()=>{ dragging=false; });
})();

/* edge (TV margin) slider drag (touch / mouse) */
(function(){
  const track = $('#edgeTrack');
  if(!track) return;
  let dragging=false;
  const getX = e => (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
  const apply = e => { setEdgeIndex(edgeIdxFromX(getX(e))); };
  track.addEventListener('pointerdown', e=>{ dragging=true; setFocus($('#edgeSlider')); apply(e); e.preventDefault(); });
  window.addEventListener('pointermove', e=>{ if(dragging) apply(e); });
  window.addEventListener('pointerup', ()=>{ dragging=false; });
})();
</script>
